<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Broadcast WA - SMA ABBS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        maroon: '#800000',
                        maroondark: '#5c0000',
                        bluelight: '#89CFF0',
                    },
                    fontFamily: { sans: ['"DM Sans"', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f4f6f8; }
        /* Toast Alert */
        .toast {
            position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
            background: #2d6a4f; color: #fff; padding: 14px 24px; border-radius: 100px;
            font-size: 13px; font-weight: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="antialiased text-slate-800 pb-20">

    <!-- Header Panel -->
    <div class="bg-gradient-to-r from-maroon to-maroondark text-white p-4 sticky top-0 z-40 shadow-md">
        <div class="max-w-3xl mx-auto flex items-center gap-3">
            <div class="w-11 h-11 bg-white rounded-full flex items-center justify-center border-2 border-bluelight overflow-hidden shrink-0 shadow-sm">
                <img src="./logo_sma_abbs_surakarta.png" alt="Logo ABBS" class="w-full h-full object-cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <span class="font-bold text-maroon text-sm hidden">AB</span>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-tight">Panel Broadcast WA</h1>
                <p class="text-xs text-bluelight">Pengiriman Undangan Massal</p>
            </div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto p-4 md:p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <!-- KOLOM KIRI: EDITOR PESAN -->
        <div class="space-y-4 h-fit sticky top-[90px]">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="font-bold text-maroon mb-2 flex items-center gap-2">
                    <span>✍️</span> Template Pesan
                </h2>
                <p class="text-xs text-slate-500 mb-4 leading-relaxed">
                    Ketik pesan Anda di bawah ini. Letakkan kursor di posisi yang diinginkan, lalu klik tombol variabel untuk menyisipkan nama atau link unik.
                </p>

                <!-- Tombol Insert Variable -->
                <div class="flex flex-wrap gap-2 mb-3">
                    <button onclick="insertTag('[Nama Siswa]')" class="text-xs font-bold bg-blue-50 text-blue-700 border border-blue-200 py-1.5 px-3 rounded-lg hover:bg-blue-100 transition">
                        + [Nama Siswa]
                    </button>
                    <button onclick="insertTag('[Link Undangan]')" class="text-xs font-bold bg-blue-50 text-blue-700 border border-blue-200 py-1.5 px-3 rounded-lg hover:bg-blue-100 transition">
                        + [Link Undangan]
                    </button>
                </div>

                <textarea id="messageInput" rows="10" class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:outline-none focus:border-maroon focus:ring-1 focus:ring-maroon transition-all" placeholder="Ketik pesan broadcast di sini..."></textarea>

                <button id="btnSaveTemplate" class="w-full bg-maroon text-white font-bold py-3 px-4 rounded-xl mt-4 hover:bg-maroondark transition-all shadow-md">
                    💾 Simpan Template
                </button>
            </div>
        </div>

        <!-- KOLOM KANAN: DAFTAR SISWA -->
        <div class="space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h2 class="font-bold text-maroon flex items-center gap-2">
                            <span>👥</span> Daftar Penerima
                        </h2>
                        <p class="text-xs text-slate-500 mt-1" id="totalSiswa">Memuat data...</p>
                    </div>
                    
                    <!-- Filter -->
                    <select id="filterGender" class="bg-slate-50 border border-slate-300 text-sm rounded-lg p-2 focus:outline-none focus:border-maroon">
                        <option value="ALL">Semua Kelas</option>
                        <option value="PUTRA">Kelas Putra</option>
                        <option value="PUTRI">Kelas Putri</option>
                    </select>
                </div>

                <!-- Search -->
                <input type="text" id="searchSiswa" placeholder="Cari nama siswa..." class="w-full bg-slate-50 border border-slate-300 rounded-xl p-3 text-sm focus:outline-none focus:border-maroon focus:ring-1 focus:ring-maroon mb-4">

                <!-- Daftar Card -->
                <div id="studentList" class="space-y-3 max-h-[60vh] overflow-y-auto pr-2 pb-4">
                    <p class="text-center text-sm text-slate-400 py-10 animate-pulse">Menarik data dari server...</p>
                </div>

            </div>
        </div>

    </main>

    <div class="toast" id="toast">✅ Berhasil disimpan!</div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz4ySkOq0Pd9cH25_z4HQ0kBNy2fKRx2yeqXO5P7EXWRzQmaDfriGswu6EsyimbuEJq/exec"; 
        
        let allStudents = [];
        
        // Elemen DOM
        const messageInput = document.getElementById('messageInput');
        const studentList = document.getElementById('studentList');
        const filterGender = document.getElementById('filterGender');
        const searchSiswa = document.getElementById('searchSiswa');
        const totalSiswa = document.getElementById('totalSiswa');
        const btnSaveTemplate = document.getElementById('btnSaveTemplate');

        // ==========================================
        // 1. INIT & FETCH DATA
        // ==========================================
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch(`${API_URL}?action=get_bc_data`);
                const data = await res.json();

                if (data.status === "success") {
                    // Isi Textarea dengan Template Terakhir
                    if(data.template) {
                        messageInput.value = data.template;
                    }

                    // Simpan data siswa ke memory
                    allStudents = data.data;
                    renderStudentList();
                } else {
                    studentList.innerHTML = `<p class="text-center text-sm text-red-500 py-10">Gagal: ${data.message}</p>`;
                }
            } catch(e) {
                studentList.innerHTML = `<p class="text-center text-sm text-red-500 py-10">Koneksi terputus. Coba *refresh* halaman.</p>`;
            }
        });

        // ==========================================
        // 2. RENDER DAFTAR SISWA & LOGIKA FILTER
        // ==========================================
        function renderStudentList() {
            const filterVal = filterGender.value;
            const searchVal = searchSiswa.value.toLowerCase();

            // Saring (Filter) data
            const filtered = allStudents.filter(std => {
                const matchGender = filterVal === "ALL" || std.gender === filterVal;
                const matchSearch = std.nama.toLowerCase().includes(searchVal);
                return matchGender && matchSearch;
            });

            totalSiswa.textContent = `Total: ${filtered.length} Siswa`;
            studentList.innerHTML = '';

            if (filtered.length === 0) {
                studentList.innerHTML = '<p class="text-center text-sm text-slate-400 py-10">Data tidak ditemukan.</p>';
                return;
            }

            // Generate HTML Card untuk tiap siswa
            filtered.forEach(std => {
                
                // Siapkan Tombol Kirim WA
                let btnHtml = "";

                if (std.waAyah) {
                    btnHtml += `<button onclick="sendWA('${std.waAyah}', '${std.nama.replace(/'/g, "\\'")}')" class="flex-1 bg-green-500 text-white text-xs font-bold py-2 px-3 rounded-lg hover:bg-green-600 transition flex items-center justify-center gap-1 shadow-sm">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.323-.297-.124-1.758-.867-2.03-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.099-.297-.124-1.255-.462-2.39-1.305-.883-.658-1.479-1.47-1.653-1.768-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
                        WA Ayah
                    </button>`;
                }
                
                if (std.waIbu) {
                    btnHtml += `<button onclick="sendWA('${std.waIbu}', '${std.nama.replace(/'/g, "\\'")}')" class="flex-1 bg-green-500 text-white text-xs font-bold py-2 px-3 rounded-lg hover:bg-green-600 transition flex items-center justify-center gap-1 shadow-sm">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.323-.297-.124-1.758-.867-2.03-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.099-.297-.124-1.255-.462-2.39-1.305-.883-.658-1.479-1.47-1.653-1.768-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/></svg>
                        WA Ibu
                    </button>`;
                }

                if(!btnHtml) {
                    btnHtml = `<span class="text-xs text-red-500 font-medium italic">Tidak ada nomor HP terdata</span>`;
                }

                const genderBadge = std.gender === "PUTRA" ? "bg-blue-100 text-blue-700" : "bg-pink-100 text-pink-700";

                studentList.insertAdjacentHTML('beforeend', `
                    <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm hover:shadow-md transition">
                        <div class="flex justify-between items-start mb-3">
                            <p class="font-bold text-slate-800 text-sm flex-1 leading-tight pr-2">${std.nama}</p>
                            <span class="text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md ${genderBadge}">${std.gender}</span>
                        </div>
                        <div class="flex gap-2">
                            ${btnHtml}
                        </div>
                    </div>
                `);
            });
        }

        filterGender.addEventListener('change', renderStudentList);
        searchSiswa.addEventListener('input', renderStudentList);

        // ==========================================
        // 3. LOGIKA INSERT TAG & SEND WA
        // ==========================================
        function insertTag(tag) {
            const cursorPosition = messageInput.selectionStart;
            const textBefore = messageInput.value.substring(0, cursorPosition);
            const textAfter = messageInput.value.substring(cursorPosition, messageInput.value.length);
            
            messageInput.value = textBefore + tag + textAfter;
            
            // Pindahkan kursor ke setelah tag yang baru di-insert
            messageInput.focus();
            messageInput.selectionStart = cursorPosition + tag.length;
            messageInput.selectionEnd = cursorPosition + tag.length;
        }

        function sendWA(waNumber, studentName) {
            let template = messageInput.value;
            
            // Validasi template kosong
            if (!template.trim()) {
                alert("Kotak pesan masih kosong! Ketik atau muat template terlebih dahulu.");
                return;
            }

            // Generate Link Unik (Sesuai dengan nomor WA orang tua yang di-klik)
            const uniqueLink = `https://awwalussanah.abbs.click/?wa=${waNumber}`;

            // Replace variabel dengan data asli
            let finalMessage = template
                .replace(/\[Nama Siswa\]/g, studentName)
                .replace(/\[Link Undangan\]/g, uniqueLink);

            // Buka WhatsApp Web/App di Tab Baru
            const encodedMessage = encodeURIComponent(finalMessage);
            window.open(`https://wa.me/${waNumber}?text=${encodedMessage}`, '_blank');
        }

        // ==========================================
        // 4. SIMPAN TEMPLATE KE GOOGLE SHEET
        // ==========================================
        btnSaveTemplate.addEventListener('click', async () => {
            const content = messageInput.value;
            btnSaveTemplate.disabled = true;
            btnSaveTemplate.textContent = "Menyimpan...";

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "save_template", template: content }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const data = await res.json();
                
                if (data.status === "success") {
                    showToast("✅ Template berhasil disimpan!");
                } else {
                    alert("Gagal: " + data.message);
                }
            } catch (err) {
                alert("Kesalahan jaringan, coba lagi.");
            } finally {
                btnSaveTemplate.disabled = false;
                btnSaveTemplate.textContent = "💾 Simpan Template";
            }
        });

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
